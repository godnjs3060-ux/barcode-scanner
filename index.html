<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="바코드 스캐너">
<title>바코드 스캐너</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500&display=swap');
  :root{
    --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;
    --accent:#00e5a0;--accent-dim:#003d2b;--text:#f0f0f0;--muted:#888;
    --danger:#ff4d4d;--warn:#f5a623;
    --font-mono:'IBM Plex Mono',monospace;--font-main:'Noto Sans KR',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--text);font-family:var(--font-main)}
  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 0 2rem}

  #scanner-wrap{flex-shrink:0;position:sticky;top:0;z-index:10;background:#000}
  #scanner-box{position:relative;width:100%;height:280px;overflow:hidden;background:#000}
  #qr-video{width:100%;height:280px;object-fit:cover;display:block}
  #scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .scan-frame{position:relative;width:55%;aspect-ratio:1}
  .sc{position:absolute;width:22px;height:22px;border-color:var(--accent);border-style:solid;border-width:0}
  .sc.tl{top:0;left:0;border-top-width:2.5px;border-left-width:2.5px}
  .sc.tr{top:0;right:0;border-top-width:2.5px;border-right-width:2.5px}
  .sc.bl{bottom:0;left:0;border-bottom-width:2.5px;border-left-width:2.5px}
  .sc.br{bottom:0;right:0;border-bottom-width:2.5px;border-right-width:2.5px}
  .scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:sl 2s ease-in-out infinite}
  @keyframes sl{0%{top:5%}50%{top:90%}100%{top:5%}}
  #cam-btn{display:block;width:100%;padding:10px;background:var(--accent);color:#000;border:none;font-size:14px;font-weight:500;font-family:var(--font-main);cursor:pointer}
  #cam-btn.stop{background:var(--surface2);color:var(--muted);border-bottom:1px solid var(--border)}

  header{padding:0.6rem 1rem;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
  .logo{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .logo svg{width:15px;height:15px;fill:none;stroke:#000;stroke-width:2.5;stroke-linecap:round}
  h1{font-size:14px;font-weight:500}
  .count-badge{margin-left:auto;font-family:var(--font-mono);font-size:12px;color:var(--accent);background:var(--accent-dim);padding:3px 10px;border-radius:20px}

  #result-panel{margin:0.3rem 0.75rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:none}
  .panel-header{padding:5px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
  .panel-header .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .panel-title{font-size:11px;color:var(--muted);letter-spacing:0.06em}
  #fields-preview{display:flex;flex-wrap:wrap;gap:4px;padding:4px 8px}
  .field-chip{background:var(--surface2);color:var(--text);font-family:var(--font-mono);font-size:11px;padding:2px 6px;border-radius:5px;border:1px solid var(--border)}
  .field-chip.qty-chip{background:var(--accent-dim);color:var(--accent);border-color:transparent}
  .field-num{font-size:10px;color:var(--muted);margin-right:2px}

  .calc-wrap{padding:6px 8px 8px}
  .calc-display{background:var(--surface2);border-radius:8px;padding:5px 12px;margin-bottom:5px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center}
  .calc-hint{font-size:10px;color:var(--muted);margin-bottom:2px}
  .calc-expr{font-family:var(--font-mono);font-size:11px;color:var(--muted);min-height:14px;text-align:right}
  .calc-result{font-family:var(--font-mono);font-size:20px;font-weight:500;color:var(--text);line-height:1.2}
  .calc-result.error{color:var(--danger);font-size:14px}
  .calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
  .calc-btn{padding:11px 0;border:none;border-radius:7px;font-size:15px;font-weight:500;font-family:var(--font-mono);cursor:pointer;background:var(--surface2);color:var(--text)}
  .calc-btn:active{opacity:0.7;transform:scale(0.95)}
  .calc-btn.op{background:#1e2e28;color:var(--accent)}
  .calc-btn.action{background:#1a1a2e;color:#7b8cde;font-size:13px;font-family:var(--font-main)}
  .calc-btn.zero{grid-column:span 2}
  .calc-btn.save{background:var(--accent);color:#000;font-family:var(--font-main);font-size:13px}
  .calc-btn.cancel{background:var(--surface2);color:var(--muted);font-family:var(--font-main);font-size:12px}

  #list-section{flex:1;padding:0.75rem 1rem 2rem}
  .list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .list-header span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}
  .header-btns{display:flex;gap:5px}
  .export-btn{font-size:11px;padding:4px 9px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:var(--font-main)}
  .reset-btn{font-size:11px;padding:4px 9px;background:transparent;color:var(--danger);border:1px solid var(--danger);border-radius:6px;cursor:pointer;font-family:var(--font-main)}
  #table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
  table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
  thead tr{background:var(--surface2)}
  th{padding:7px 9px;text-align:left;color:var(--muted);font-weight:500;font-size:11px;white-space:nowrap;border-bottom:1px solid var(--border)}
  td{padding:7px 9px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--surface2)}
  .td-mono{font-family:var(--font-mono);font-size:11px}
  .td-qty{color:var(--accent);font-family:var(--font-mono);font-weight:500}
  .td-actions{display:flex;gap:4px;justify-content:center}
  .btn-edit{background:none;border:1px solid var(--border);color:var(--warn);cursor:pointer;font-size:11px;padding:3px 7px;border-radius:5px}
  .btn-del{background:none;border:1px solid var(--border);color:#555;cursor:pointer;font-size:11px;padding:3px 7px;border-radius:5px}
  .btn-del:hover{color:var(--danger);border-color:var(--danger)}
  .btn-edit:hover{border-color:var(--warn)}

  #edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:flex-end;justify-content:center}
  #edit-modal.show{display:flex}
  .edit-box{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:1.25rem;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
  .edit-box h3{font-size:14px;font-weight:500;margin-bottom:4px}
  .edit-sub{font-size:12px;color:var(--muted);margin-bottom:1rem;font-family:var(--font-mono);word-break:break-all}
  .edit-fields{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
  .edit-field-row{display:flex;align-items:center;gap:8px}
  .edit-field-row label{font-size:12px;color:var(--muted);min-width:64px;flex-shrink:0}
  .edit-field-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;color:var(--text);font-family:var(--font-mono);font-size:13px;outline:none}
  .edit-field-row input:focus{border-color:var(--accent)}
  .edit-field-row input.qty-input{border-color:rgba(0,229,160,0.3);color:var(--accent)}
  .edit-actions{display:flex;gap:8px}
  .edit-actions button{flex:1;padding:12px;border-radius:8px;border:none;font-size:14px;font-family:var(--font-main);cursor:pointer;font-weight:500}
  .btn-edit-cancel{background:var(--surface2);color:var(--muted)}
  .btn-edit-save{background:var(--accent);color:#000}

  #del-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center}
  #del-modal.show{display:flex}
  #confirm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center}
  #confirm-modal.show{display:flex}
  .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;width:280px;text-align:center}
  .modal-box h3{font-size:15px;font-weight:500;margin-bottom:8px}
  .modal-box p{font-size:13px;color:var(--muted);margin-bottom:1.25rem;line-height:1.6}
  .modal-btns{display:flex;gap:8px}
  .modal-btns button{flex:1;padding:11px;border-radius:8px;border:none;font-size:14px;font-family:var(--font-main);cursor:pointer;font-weight:500}
  .btn-no{background:var(--surface2);color:var(--muted)}
  .btn-yes-del{background:var(--danger);color:#fff}
  .btn-yes-reset{background:var(--danger);color:#fff}

  .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:13px;padding:10px 20px;border-radius:8px;opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;white-space:nowrap;z-index:999}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div id="scanner-wrap">
    <div id="scanner-box">
      <video id="qr-video" playsinline muted autoplay></video>
      <div id="scan-overlay">
        <div class="scan-frame">
          <div class="sc tl"></div><div class="sc tr"></div>
          <div class="sc bl"></div><div class="sc br"></div>
          <div class="scan-line"></div>
        </div>
      </div>
    </div>
    <button id="cam-btn">카메라 시작</button>
  </div>

  <header>
    <div class="logo">
      <svg viewBox="0 0 20 20"><rect x="2" y="2" width="3" height="16" rx="1"/><rect x="7" y="2" width="1.5" height="16" rx="0.5"/><rect x="10" y="2" width="3" height="16" rx="1"/><rect x="15" y="2" width="1.5" height="16" rx="0.5"/></svg>
    </div>
    <h1>바코드 스캐너</h1>
    <div class="count-badge" id="count-badge">0건</div>
  </header>

  <div id="result-panel">
    <div class="panel-header"><div class="dot"></div><span class="panel-title">수량 확인 / 수정</span></div>
    <div id="fields-preview"></div>
    <div class="calc-wrap">
      <div class="calc-display">
        <div class="calc-hint" id="calc-hint"></div>
        <div class="calc-expr" id="calc-expr"></div>
        <div class="calc-result" id="calc-result">1</div>
      </div>
      <div class="calc-grid">
        <button class="calc-btn action" data-action="clear">C</button>
        <button class="calc-btn action" data-action="back">⌫</button>
        <button class="calc-btn op" data-val="%">%</button>
        <button class="calc-btn op" data-val="/">÷</button>
        <button class="calc-btn" data-val="7">7</button>
        <button class="calc-btn" data-val="8">8</button>
        <button class="calc-btn" data-val="9">9</button>
        <button class="calc-btn op" data-val="*">×</button>
        <button class="calc-btn" data-val="4">4</button>
        <button class="calc-btn" data-val="5">5</button>
        <button class="calc-btn" data-val="6">6</button>
        <button class="calc-btn op" data-val="-">−</button>
        <button class="calc-btn" data-val="1">1</button>
        <button class="calc-btn" data-val="2">2</button>
        <button class="calc-btn" data-val="3">3</button>
        <button class="calc-btn op" data-val="+">+</button>
        <button class="calc-btn zero" data-val="0">0</button>
        <button class="calc-btn" data-val=".">.</button>
        <button class="calc-btn save" id="save-btn">저장</button>
        <button class="calc-btn cancel" data-action="cancel" style="grid-column:span 4">취소</button>
      </div>
    </div>
  </div>

  <div id="list-section">
    <div class="list-header">
      <span>스캔 기록</span>
      <div class="header-btns">
        <button class="export-btn" id="csv-btn">CSV</button>
        <button class="export-btn" id="xlsx-btn">엑셀</button>
        <button class="reset-btn" id="reset-btn">초기화</button>
      </div>
    </div>
    <div id="table-wrap"></div>
  </div>
</div>

<div id="edit-modal">
  <div class="edit-box">
    <h3>항목 수정</h3>
    <div class="edit-sub" id="edit-barcode-raw"></div>
    <div class="edit-fields" id="edit-fields"></div>
    <div class="edit-actions">
      <button class="btn-edit-cancel" id="edit-cancel">취소</button>
      <button class="btn-edit-save" id="edit-save">저장</button>
    </div>
  </div>
</div>

<div id="del-modal">
  <div class="modal-box">
    <h3>삭제 확인</h3>
    <p>이 항목을 삭제할까요?<br>삭제 후 복구할 수 없습니다.</p>
    <div class="modal-btns">
      <button class="btn-no" id="del-cancel">취소</button>
      <button class="btn-yes-del" id="del-ok">삭제</button>
    </div>
  </div>
</div>

<div id="confirm-modal">
  <div class="modal-box">
    <h3>전체 초기화</h3>
    <p>저장된 모든 스캔 기록이<br>삭제됩니다. 계속할까요?</p>
    <div class="modal-btns">
      <button class="btn-no" id="modal-cancel">취소</button>
      <button class="btn-yes-reset" id="modal-ok">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
const STORAGE_KEY='barcode_records_v3';
let records=[];
let scanner=null,scanning=false,lastCode='',lastTime=0;
let expr='',defaultQty=1,editingIdx=-1,deletingIdx=-1;

function saveToStorage(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(records));}catch(e){}}
function loadFromStorage(){
  try{
    for(const k of[STORAGE_KEY,'barcode_records_v2','barcode_records_v1']){
      const d=localStorage.getItem(k);if(d){records=JSON.parse(d);break;}
    }
    records=records.map(r=>{if(!r.fields)r.fields=splitBarcode(r.barcode||'');return r;});
  }catch(e){records=[];}
}

const camBtn=document.getElementById('cam-btn');
const resultPanel=document.getElementById('result-panel');
const fieldsPreview=document.getElementById('fields-preview');
const calcExprEl=document.getElementById('calc-expr');
const calcResultEl=document.getElementById('calc-result');
const calcHint=document.getElementById('calc-hint');
const countBadge=document.getElementById('count-badge');
const tableWrap=document.getElementById('table-wrap');
const toast=document.getElementById('toast');
const confirmModal=document.getElementById('confirm-modal');
const editModal=document.getElementById('edit-modal');
const delModal=document.getElementById('del-modal');

function showToast(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>toast.classList.remove('show'),2200);}
function fmt(d){const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;}
function splitBarcode(code){return code.split('/').map(s=>s.trim());}
function extractQty(fields){if(fields.length>=3){const v=parseFloat(fields[2]);if(!isNaN(v)&&v>0)return v;}return 1;}
function evalExpr(e){
  try{
    const clean=e.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
    const r=Function('"use strict";return ('+clean+')')();
    if(!isFinite(r)||isNaN(r))return null;
    return Math.round(r*1000)/1000;
  }catch(err){return null;}
}
function updateCalc(){
  if(!expr){calcExprEl.textContent='';calcResultEl.textContent=defaultQty;calcResultEl.className='calc-result';return;}
  calcExprEl.textContent=expr.replace(/\*/g,'×').replace(/\//g,'÷');
  const r=evalExpr(expr);
  if(r!==null){calcResultEl.textContent=r;calcResultEl.className='calc-result';}
  else{calcResultEl.textContent='오류';calcResultEl.className='calc-result error';}
}
function getFinalQty(){
  if(!expr)return defaultQty;
  const r=evalExpr(expr);
  return(r!==null&&r>0)?Math.round(r):null;
}

document.querySelector('.calc-grid').addEventListener('click',e=>{
  const btn=e.target.closest('.calc-btn');if(!btn)return;
  const action=btn.dataset.action,val=btn.dataset.val;
  if(action==='clear'){expr='';updateCalc();}
  else if(action==='back'){expr=expr.slice(0,-1);updateCalc();}
  else if(action==='cancel'){resultPanel.style.display='none';expr='';}
  else if(val!==undefined){
    const ops=['+','-','*','/','%'];
    if(ops.includes(val)&&ops.includes(expr.slice(-1)))expr=expr.slice(0,-1);
    expr+=val;updateCalc();
  }
});

document.getElementById('save-btn').addEventListener('click',()=>{
  const qty=getFinalQty();
  if(qty===null){showToast('올바른 수량을 입력해주세요');return;}
  const code=currentCode;
  const fields=splitBarcode(code);
  while(fields.length<3)fields.push('');
  fields[2]=String(qty);
  records.push({barcode:code,fields,datetime:fmt(new Date()),qty});
  saveToStorage();
  resultPanel.style.display='none';
  expr='';
  renderList();
  showToast('저장되었습니다');
  window.scrollTo({top:0,behavior:'smooth'});
});

let currentCode='';
function onDetected(code){
  const now=Date.now();
  if(code===lastCode&&now-lastTime<3000)return;
  lastCode=code;lastTime=now;
  if(navigator.vibrate)navigator.vibrate(100);
  currentCode=code;
  const fields=splitBarcode(code);
  defaultQty=extractQty(fields);
  fieldsPreview.innerHTML=fields.map((f,i)=>`<span class="field-chip${i===2?' qty-chip':''}"><span class="field-num">${i+1}</span>${f||'&nbsp;'}</span>`).join('');
  calcHint.textContent=fields.length>=3?`바코드 수량: ${defaultQty}`:'기본값 1';
  expr='';updateCalc();
  resultPanel.style.display='block';
  setTimeout(()=>resultPanel.scrollIntoView({behavior:'smooth',block:'start'}),50);
}

async function startCamera(){
  if(!scanner)scanner=new Html5Qrcode('qr-video-container');
  try{
    await scanner.start(
      {facingMode:'environment'},
      {fps:15,qrbox:{width:250,height:250}},
      onDetected,()=>{}
    );
    scanning=true;
    camBtn.textContent='스캔 중지';
    camBtn.classList.add('stop');
  }catch(e){showToast('카메라 권한이 필요합니다');}
}
async function stopCamera(){
  if(scanner&&scanning){try{await scanner.stop();}catch(e){}}
  scanning=false;
  camBtn.textContent='카메라 시작';
  camBtn.classList.remove('stop');
}
camBtn.addEventListener('click',async()=>{if(!scanning)await startCamera();else await stopCamera();});

function openEditModal(idx){
  editingIdx=idx;
  const r=records[idx];
  document.getElementById('edit-barcode-raw').textContent=r.barcode;
  const container=document.getElementById('edit-fields');
  container.innerHTML='';
  r.fields.forEach((f,i)=>{
    const row=document.createElement('div');row.className='edit-field-row';
    const label=document.createElement('label');label.textContent=i===2?'수량':`항목 ${i+1}`;
    const input=document.createElement('input');
    input.type='text';input.value=f;input.dataset.fieldIdx=String(i);
    if(i===2)input.className='qty-input';
    row.appendChild(label);row.appendChild(input);
    container.appendChild(row);
  });
  editModal.classList.add('show');
}
document.getElementById('edit-cancel').addEventListener('click',()=>editModal.classList.remove('show'));
document.getElementById('edit-save').addEventListener('click',()=>{
  const r=records[editingIdx];
  document.querySelectorAll('#edit-fields input').forEach(inp=>{r.fields[+inp.dataset.fieldIdx]=inp.value.trim();});
  const qtyVal=parseFloat(r.fields[2]);
  r.qty=(!isNaN(qtyVal)&&qtyVal>0)?qtyVal:1;
  saveToStorage();renderList();
  editModal.classList.remove('show');showToast('수정되었습니다');
});

document.getElementById('del-cancel').addEventListener('click',()=>delModal.classList.remove('show'));
document.getElementById('del-ok').addEventListener('click',()=>{
  if(deletingIdx>=0){records.splice(deletingIdx,1);saveToStorage();renderList();showToast('삭제되었습니다');}
  delModal.classList.remove('show');deletingIdx=-1;
});

function getMaxCols(){let m=0;records.forEach(r=>{if(r.fields&&r.fields.length>m)m=r.fields.length;});return m;}
function renderList(){
  countBadge.textContent=records.length+'건';
  if(!records.length){tableWrap.innerHTML='<div style="padding:3rem 0;text-align:center;color:var(--muted);font-size:13px;line-height:2">아직 스캔된 항목이 없습니다</div>';return;}
  const maxCols=getMaxCols();
  let html='<table><thead><tr><th>날짜/시간</th>';
  for(let i=0;i<maxCols;i++)html+=`<th>${i===2?'수량':'항목'+(i+1)}</th>`;
  html+='<th>관리</th></tr></thead><tbody>';
  [...records].reverse().forEach((r,ri)=>{
    const idx=records.length-1-ri;
    html+=`<tr><td class="td-mono" style="white-space:nowrap;font-size:11px">${r.datetime}</td>`;
    for(let c=0;c<maxCols;c++){
      const val=r.fields&&r.fields[c]!==undefined?r.fields[c]:'';
      html+=c===2?`<td class="td-qty">${val}</td>`:`<td class="td-mono">${val}</td>`;
    }
    html+=`<td><div class="td-actions"><button class="btn-edit" data-i="${idx}">수정</button><button class="btn-del" data-i="${idx}">삭제</button></div></td></tr>`;
  });
  html+='</tbody></table>';
  tableWrap.innerHTML=html;
  tableWrap.querySelectorAll('.btn-edit').forEach(b=>b.addEventListener('click',()=>openEditModal(+b.dataset.i)));
  tableWrap.querySelectorAll('.btn-del').forEach(b=>b.addEventListener('click',()=>{deletingIdx=+b.dataset.i;delModal.classList.add('show');}));
}

document.getElementById('reset-btn').addEventListener('click',()=>confirmModal.classList.add('show'));
document.getElementById('modal-cancel').addEventListener('click',()=>confirmModal.classList.remove('show'));
document.getElementById('modal-ok').addEventListener('click',()=>{records=[];saveToStorage();renderList();confirmModal.classList.remove('show');showToast('초기화되었습니다');});

function buildExportRows(){
  const maxCols=getMaxCols();
  const headers=['날짜/시간',...Array.from({length:maxCols},(_,i)=>i===2?'수량':`항목${i+1}`)];
  const rows=records.map(r=>{
    const row={'날짜/시간':r.datetime};
    for(let i=0;i<maxCols;i++)row[i===2?'수량':`항목${i+1}`]=r.fields&&r.fields[i]!==undefined?r.fields[i]:'';
    return row;
  });
  return{headers,rows};
}
document.getElementById('csv-btn').addEventListener('click',()=>{
  if(!records.length){showToast('저장할 데이터가 없습니다');return;}
  const{headers,rows}=buildExportRows();
  const lines=['\uFEFF'+headers.join(','),...rows.map(r=>headers.map(h=>'"'+(r[h]||'')+'"').join(','))];
  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`scan_${new Date().toISOString().slice(0,10)}.csv`;a.click();
});
document.getElementById('xlsx-btn').addEventListener('click',()=>{
  if(!records.length){showToast('저장할 데이터가 없습니다');return;}
  const{rows}=buildExportRows();
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'스캔기록');
  XLSX.writeFile(wb,`scan_${new Date().toISOString().slice(0,10)}.xlsx`);
});

loadFromStorage();
renderList();
// html5-qrcode는 자체 video 엘리먼트를 생성하므로 별도 컨테이너 div 필요
const container=document.getElementById('scanner-box');
const qrDiv=document.createElement('div');
qrDiv.id='qr-video-container';
qrDiv.style.cssText='width:100%;height:280px;overflow:hidden;';
container.insertBefore(qrDiv,container.firstChild);
// 자동 시작
startCamera();
</script>
