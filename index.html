<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="바코드 스캐너">
<title>바코드 스캐너</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&display=swap');
  :root{
    --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;
    --accent:#00e5a0;--accent-dim:#003d2b;--text:#f0f0f0;--muted:#888;
    --danger:#ff4d4d;--warn:#f5a623;
    --mode-in:#3b82f6;--mode-in-dim:#1e3a5f;
    --mode-out:#f97316;--mode-out-dim:#5a2d0f;
    --mode-inv:#00e5a0;--mode-inv-dim:#003d2b;
    --font:'Noto Sans KR',sans-serif;--mono:monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--text);font-family:var(--font)}
  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:2rem}
  #cam-wrap{position:sticky;top:0;z-index:10;background:#000;flex-shrink:0}
  #cam-box{position:relative;width:100%;height:200px;overflow:hidden;background:#000}
  #vid{width:100%;height:200px;object-fit:cover;display:block}
  #overlay{position:absolute;inset:0;pointer-events:none}
  #overlay canvas{position:absolute;inset:0;width:100%;height:100%}
  .frame-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60%;aspect-ratio:1}
  .corner{position:absolute;width:28px;height:28px;border-color:var(--accent);border-style:solid;border-width:0}
  .corner.tl{top:0;left:0;border-top-width:4px;border-left-width:4px;border-radius:3px 0 0 0}
  .corner.tr{top:0;right:0;border-top-width:4px;border-right-width:4px;border-radius:0 3px 0 0}
  .corner.bl{bottom:0;left:0;border-bottom-width:4px;border-left-width:4px;border-radius:0 0 0 3px}
  .corner.br{bottom:0;right:0;border-bottom-width:4px;border-right-width:4px;border-radius:0 0 3px 0}
  body.mode-in .corner{border-color:var(--mode-in)}
  body.mode-out .corner{border-color:var(--mode-out)}
  body.mode-inv .corner{border-color:var(--mode-inv)}
  #cam-status{text-align:center;padding:8px;font-size:13px;background:var(--surface2);color:var(--muted);border-top:1px solid var(--border)}
  header{padding:0.6rem 1rem;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
  .logo{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;transition:background .2s}
  body.mode-in .logo{background:var(--mode-in)}
  body.mode-out .logo{background:var(--mode-out)}
  body.mode-inv .logo{background:var(--mode-inv)}
  .logo svg{width:15px;height:15px;fill:none;stroke:#000;stroke-width:2.5}
  h1{font-size:14px;font-weight:500}
  #badge{margin-left:auto;font-size:11px;color:var(--accent);background:var(--accent-dim);padding:2px 9px;border-radius:20px;transition:all .2s}
  body.mode-in #badge{color:var(--mode-in);background:var(--mode-in-dim)}
  body.mode-out #badge{color:var(--mode-out);background:var(--mode-out-dim)}
  body.mode-inv #badge{color:var(--mode-inv);background:var(--mode-inv-dim)}
  /* 모드 토글 (세그먼트 컨트롤 스타일) */
  #mode-bar{padding:8px 10px;border-bottom:1px solid var(--border);background:var(--surface)}
  .mode-toggle{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;background:#0a0a0a;border:1px solid var(--border);border-radius:10px;padding:3px}
  .mbtn{padding:10px 4px;border:none;background:transparent;color:var(--muted);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border-radius:7px;transition:all .18s cubic-bezier(.4,0,.2,1);position:relative}
  .mbtn:active{transform:scale(.97)}
  .mbtn.active{color:#fff;font-weight:600;box-shadow:0 2px 6px rgba(0,0,0,.3)}
  .mbtn[data-mode="in"].active{background:var(--mode-in);color:#fff}
  .mbtn[data-mode="out"].active{background:var(--mode-out);color:#fff}
  .mbtn[data-mode="inv"].active{background:var(--mode-inv);color:#000}
  #worker-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--surface);border-bottom:1px solid var(--border)}
  #worker-bar label{font-size:11px;color:var(--muted);white-space:nowrap}
  #worker-bar select{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 6px;color:var(--text);font-size:12px;font-family:var(--font);outline:none;min-width:0}
  .wdiv{width:1px;height:24px;background:var(--border);flex-shrink:0}
  #cam-start-btn{display:block;width:100%;padding:11px;background:var(--accent);color:#000;border:none;font-size:14px;font-weight:500;font-family:var(--font);cursor:pointer;transition:background .2s}
  body.mode-in #cam-start-btn{background:var(--mode-in);color:#fff}
  body.mode-out #cam-start-btn{background:var(--mode-out);color:#fff}
  body.mode-inv #cam-start-btn{background:var(--mode-inv);color:#000}
  #manual-btn{display:block;width:100%;padding:9px;background:var(--surface2);color:var(--muted);border:none;border-top:1px solid var(--border);font-size:13px;cursor:pointer;font-family:var(--font)}
  #rp-backdrop{display:none}
  #rp{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:2px solid var(--accent);border-radius:16px 16px 0 0;z-index:50;overflow:hidden;padding-bottom:env(safe-area-inset-bottom,8px)}
  body.mode-in #rp{border-top-color:var(--mode-in)}
  body.mode-out #rp{border-top-color:var(--mode-out)}
  body.mode-inv #rp{border-top-color:var(--mode-inv)}
  #rp.show{display:block!important}
  .rph{padding:4px 9px;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted)}
  #fp{display:flex;flex-wrap:wrap;gap:3px;padding:3px 7px}
  .chip{background:var(--surface2);color:var(--text);font-size:10px;padding:1px 5px;border-radius:4px;border:1px solid var(--border);font-family:var(--mono)}
  .chip.q{background:var(--accent-dim);color:var(--accent);border-color:transparent}
  body.mode-in .chip.q{background:var(--mode-in-dim);color:var(--mode-in)}
  body.mode-out .chip.q{background:var(--mode-out-dim);color:var(--mode-out)}
  .cnum{font-size:9px;color:var(--muted);margin-right:2px}
  .cw{padding:4px 6px 6px}
  .cd{background:var(--surface2);border-radius:6px;padding:3px 10px;margin-bottom:3px;text-align:right}
  .chint{font-size:10px;color:var(--muted);line-height:1.2}
  .cexpr{font-size:10px;color:var(--muted);font-family:var(--mono);min-height:12px}
  .cval{font-size:16px;font-weight:500;font-family:var(--mono)}
  .cval.err{color:var(--danger);font-size:14px}
  .cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
  .cb{padding:8px 0;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;background:var(--surface2);color:var(--text);font-family:var(--mono)}
  .cb:active{opacity:.7;transform:scale(.96)}
  .cb.op{background:#1e2e28;color:var(--accent)}
  body.mode-in .cb.op{background:#1e283c;color:var(--mode-in)}
  body.mode-out .cb.op{background:#2e2015;color:var(--mode-out)}
  .cb.act{background:#1a1a2e;color:#7b8cde;font-size:13px;font-family:var(--font)}
  .cb.s2{grid-column:span 2}
  .cb.ok{background:var(--accent);color:#000;font-family:var(--font);font-size:13px}
  body.mode-in .cb.ok{background:var(--mode-in);color:#fff}
  body.mode-out .cb.ok{background:var(--mode-out);color:#fff}
  .cb.ng{background:var(--surface2);color:var(--muted);font-family:var(--font);font-size:12px}
  .lhd{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem .4rem}
  .lhd span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .lbtns{display:flex;gap:5px}
  .xb{font-size:11px;padding:4px 8px;border-radius:5px;cursor:pointer;font-family:var(--font)}
  .xb.e{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
  .xb.r{background:transparent;color:var(--danger);border:1px solid var(--danger)}
  #tw{overflow-x:auto;margin:0 .5rem;border-radius:10px;border:1px solid var(--border)}
  table{width:100%;border-collapse:collapse;font-size:11px;min-width:520px}
  thead{background:var(--surface2)}
  th{padding:6px 8px;text-align:left;color:var(--muted);font-weight:500;white-space:nowrap;border-bottom:1px solid var(--border)}
  td{padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;font-family:var(--mono)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--surface2)}
  .tq{color:var(--accent);font-weight:500;cursor:pointer;position:relative}
  .tq:hover{background:var(--surface2)}
  .tq:after{content:"✏️";font-size:8px;margin-left:3px;opacity:.5}
  .tq.editing{background:var(--surface2);padding:2px 4px!important}
  .tq input{width:70px;background:var(--bg);border:1px solid var(--accent);color:var(--accent);border-radius:4px;padding:4px 6px;font-family:var(--mono);font-size:13px;font-weight:500;text-align:right;outline:none}
  body.mode-in .tq input{border-color:var(--mode-in);color:var(--mode-in)}
  body.mode-out .tq input{border-color:var(--mode-out);color:var(--mode-out)}
  .tmode{font-size:10px;font-weight:500;padding:1px 6px;border-radius:4px;display:inline-block;white-space:nowrap}
  .tmode.in{background:var(--mode-in-dim);color:var(--mode-in)}
  .tmode.out{background:var(--mode-out-dim);color:var(--mode-out)}
  .tmode.inv{background:var(--mode-inv-dim);color:var(--mode-inv)}
  .tacts{display:flex;gap:3px}
  .tb{background:none;border:1px solid var(--border);cursor:pointer;font-size:10px;padding:2px 6px;border-radius:4px}
  .tb.te{color:var(--warn)}.tb.td{color:#555}
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center}
  .modal.show{display:flex}
  .mbox{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;width:280px;text-align:center}
  .mbox h3{font-size:15px;font-weight:500;margin-bottom:8px}
  .mbox p{font-size:13px;color:var(--muted);margin-bottom:1.2rem;line-height:1.6}
  .mbtns{display:flex;gap:8px}
  .mbtns button{flex:1;padding:11px;border-radius:8px;border:none;font-size:14px;cursor:pointer;font-weight:500}
  .mno{background:var(--surface2);color:var(--muted)}
  .myes{background:var(--danger);color:#fff}
  #em{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center}
  #em.show{display:flex}
  .ebox{background:var(--surface);border-radius:16px 16px 0 0;padding:1.2rem;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
  .ebox h3{font-size:14px;font-weight:500;margin-bottom:.75rem}
  .erow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .erow label{font-size:12px;color:var(--muted);min-width:70px}
  .erow input,.erow select{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none}
  .erow input:focus,.erow select:focus{border-color:var(--accent)}
  .erow input.qi{color:var(--accent)}
  .eacts{display:flex;gap:8px;margin-top:12px}
  .eacts button{flex:1;padding:11px;border-radius:8px;border:none;font-size:14px;cursor:pointer;font-weight:500}
  .enc{background:var(--surface2);color:var(--muted)}
  .eok{background:var(--accent);color:#000}
  body.mode-in .eok{background:var(--mode-in);color:#fff}
  body.mode-out .eok{background:var(--mode-out);color:#fff}
  .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:13px;padding:10px 20px;border-radius:8px;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body class="mode-inv">
<div id="app">
  <div id="cam-wrap">
    <div id="cam-box">
      <video id="vid" playsinline muted autoplay></video>
      <canvas id="scan-canvas" style="position:absolute;top:0;left:0;width:100%;height:200px;pointer-events:none"></canvas>
      <div id="overlay">
        <div class="frame-box">
          <div class="corner tl"></div><div class="corner tr"></div>
          <div class="corner bl"></div><div class="corner br"></div>
        </div>
      </div>
    </div>
    <button id="cam-start-btn">📷 카메라 시작</button>
    <div id="cam-status" style="display:none;text-align:center;padding:8px;font-size:13px;background:var(--surface2);color:var(--muted);border-top:1px solid var(--border)">스캔 중...</div>
    <button id="manual-btn">✏️ 수기입력</button>
  </div>
  <header>
    <div class="logo"><svg viewBox="0 0 20 20"><rect x="2" y="2" width="3" height="16" rx="1"/><rect x="7" y="2" width="1.5" height="16" rx="0.5"/><rect x="10" y="2" width="3" height="16" rx="1"/><rect x="15" y="2" width="1.5" height="16" rx="0.5"/></svg></div>
    <h1>바코드 스캐너 <span style="font-size:10px;color:var(--muted);font-weight:400">v3.0</span></h1>
    <div id="badge">0건</div>
  </header>
  <!-- 📊 모드 토글 -->
  <div id="mode-bar">
    <div class="mode-toggle">
      <button class="mbtn" data-mode="in">📥 입고</button>
      <button class="mbtn" data-mode="out">📤 출고</button>
      <button class="mbtn active" data-mode="inv">📋 재고파악</button>
    </div>
  </div>
  <div id="worker-bar">
    <label>👤</label>
    <select id="worker-select"><option value="">작업자 선택</option><option>정해원</option><option>온한섭</option><option>조민호</option><option>정해석</option><option>작업자1</option><option>작업자2</option></select>
    <div class="wdiv"></div>
    <label id="ctx-label">📍</label>
    <select id="ctx-select"></select>
  </div>
  <div id="ctx-custom-bar" style="display:flex;align-items:center;gap:6px;padding:4px 10px 6px;background:var(--surface);border-bottom:1px solid var(--border)">
    <label style="font-size:11px;color:var(--muted);white-space:nowrap">✏️</label>
    <input id="ctx-custom" type="text" placeholder="직접 입력 (선택사항 — 드롭다운 대신 사용)" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;font-family:var(--font);outline:none;min-width:0">
    <button id="ctx-custom-clear" style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:10px;padding:4px 8px;cursor:pointer;font-family:var(--font)">지우기</button>
  </div>
  <div id="rp-backdrop"></div>
  <div id="rp">
    <div class="rph">수량 확인 / 수정</div>
    <div id="fp"></div>
    <div class="cw">
      <div class="cd">
        <div class="chint" id="chint"></div>
        <div class="cexpr" id="cexpr"></div>
        <div class="cval" id="cval">1</div>
      </div>
      <div class="cgrid">
        <button class="cb act" data-a="C">C</button>
        <button class="cb act" data-a="back">⌫</button>
        <button class="cb op" data-v="%">%</button>
        <button class="cb op" data-v="/">÷</button>
        <button class="cb" data-v="7">7</button><button class="cb" data-v="8">8</button><button class="cb" data-v="9">9</button>
        <button class="cb op" data-v="*">×</button>
        <button class="cb" data-v="4">4</button><button class="cb" data-v="5">5</button><button class="cb" data-v="6">6</button>
        <button class="cb op" data-v="-">−</button>
        <button class="cb" data-v="1">1</button><button class="cb" data-v="2">2</button><button class="cb" data-v="3">3</button>
        <button class="cb op" data-v="+">+</button>
        <button class="cb s2" data-v="0">0</button>
        <button class="cb" data-v=".">.</button>
        <button class="cb ok" id="save-btn">저장</button>
        <button class="cb ng" data-a="cancel" style="grid-column:span 4">취소</button>
      </div>
    </div>
  </div>
  <div class="lhd">
    <span>스캔 기록</span>
    <div class="lbtns">
      <button class="xb e" id="csv-btn">CSV</button>
      <label class="xb e" style="cursor:pointer">불러오기<input type="file" id="import-file" accept=".xlsx,.csv" style="display:none"></label>
      <button class="xb e" id="xlsx-btn">엑셀</button>
      <button class="xb r" id="reset-btn">초기화</button>
    </div>
  </div>
  <div id="tw"><div style="padding:2.5rem 0;text-align:center;color:var(--muted);font-size:13px;line-height:2">아직 스캔된 항목이 없습니다</div></div>
</div>

<!-- 수정 모달 -->
<div id="em">
  <div class="ebox">
    <h3>항목 수정</h3>
    <div id="efields"></div>
    <div class="eacts">
      <button class="enc" id="ec">취소</button>
      <button class="eok" id="es">저장</button>
    </div>
  </div>
</div>
<!-- 삭제 확인 -->
<div class="modal" id="dm">
  <div class="mbox">
    <h3>삭제 확인</h3>
    <p>이 항목을 삭제할까요?<br>삭제 후 복구할 수 없습니다.</p>
    <div class="mbtns"><button class="mno" id="dc">취소</button><button class="myes" id="dok">삭제</button></div>
  </div>
</div>
<!-- 초기화 확인 -->
<div class="modal" id="cm">
  <div class="mbox">
    <h3>전체 초기화</h3>
    <p>저장된 모든 기록이<br>삭제됩니다. 계속할까요?</p>
    <div class="mbtns"><button class="mno" id="cc">취소</button><button class="myes" id="cok">삭제</button></div>
  </div>
</div>
<!-- 불러오기 확인 모달 -->
<div class="modal" id="im">
  <div class="mbox">
    <h3>불러오기</h3>
    <p>기존 데이터가 있습니다.<br>저장 후 불러올까요?</p>
    <div class="mbtns">
      <button class="mno" id="im-cancel">취소</button>
      <button class="myes" id="im-ok" style="background:var(--accent);color:#000">불러오기</button>
    </div>
  </div>
</div>
<!-- 수기입력 모달 -->
<div id="mm" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200">
  <div style="position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-radius:16px 16px 0 0;display:flex;flex-direction:column;max-height:85vh">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0">
      <h3 style="margin:0;font-size:14px;font-weight:500">✏️ 수기입력</h3>
      <div style="display:flex;gap:8px">
        <button class="enc" id="m-cancel" style="padding:7px 18px">취소</button>
        <button class="eok" id="m-ok" style="padding:7px 18px">확인</button>
      </div>
    </div>
    <div style="overflow-y:auto;padding:12px 16px;flex:1">
      <div class="erow"><label>바코드</label><input type="text" id="m-f0" placeholder="*GA0014*"></div>
      <div class="erow"><label>품명</label><input type="text" id="m-f1" placeholder="특딱파"></div>
      <div class="erow"><label style="color:var(--accent);font-weight:500">수량</label><input type="number" id="m-f2" class="qi" placeholder="8"></div>
      <div class="erow"><label>비고</label><input type="text" id="m-f3" placeholder="비고내용"></div>
      <div class="erow"><label>시트명</label><input type="text" id="m-f4" placeholder="시트명"></div>
      <div class="erow"><label>파레트위치</label><input type="text" id="m-f5" placeholder=""></div>
      <div class="erow"><label>구분</label><input type="text" id="m-f6" placeholder=""></div>
      <div class="erow"><label>업체명</label><input type="text" id="m-f7" placeholder=""></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SK='barcode_v5';
let records=[],expr='',defQty=1,editIdx=-1,delIdx=-1,currentCode='';
let stream=null,raf=null,scanning=false,detector=null,lastCode='',lastTime=0,lastResults=[];

// ===== 모드 설정 =====
// 각 모드별 컨텍스트 드롭다운 옵션 (수정 시 여기만 바꾸면 됨)
const MODE_CONFIG={
  'in': {
    label:'📦',
    ctxLabel:'입고사유',
    options:['생산입고','거래처입고','반품입고','입고누락','기타오차'],
    emoji:'📥',
    name:'입고'
  },
  'out': {
    label:'🚚',
    ctxLabel:'출고사유',
    options:['사장님출고','재가공 출고','출고누락','기타오차'],
    emoji:'📤',
    name:'출고'
  },
  'inv': {
    label:'📍',
    ctxLabel:'위치',
    options:['매장','1번냉동','2번냉동','3번냉동','4번냉동'],
    emoji:'📋',
    name:'재고파악'
  }
};
let currentMode='inv';  // 'in' | 'out' | 'inv'

function save(){try{localStorage.setItem(SK,JSON.stringify(records));}catch(e){}}
function load(){
  try{
    for(const k of[SK,'barcode_v4','barcode_records_v3','barcode_records_v2','barcode_records_v1']){
      const d=localStorage.getItem(k);
      if(d){records=JSON.parse(d);break;}
    }
    records=records.map(r=>{
      if(!r.fields)r.fields=split(r.barcode||'');
      if(!r.mode)r.mode='inv'; // 기존 데이터는 재고파악으로 취급
      if(!r.ctx)r.ctx=r.location||'';  // 예전 location 필드 → ctx로 마이그레이션
      return r;
    });
  }catch(e){records=[];}
}

const vid=document.getElementById('vid');
const status=document.getElementById('cam-status');
const rp=document.getElementById('rp');
const fp=document.getElementById('fp');
const cexpr=document.getElementById('cexpr');
const cval=document.getElementById('cval');
const chint=document.getElementById('chint');
const badge=document.getElementById('badge');
const tw=document.getElementById('tw');
const toast=document.getElementById('toast');

function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>toast.classList.remove('show'),2200);}
function fmt(d){const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;}

function split(code){
  const parts=code.split('/').map(s=>s.trim());
  if(parts[0]){
    const m=parts[0].match(/^(\*[^*]+\*)(.+)$/);
    if(m){parts.splice(0,1,m[1],m[2]);}
  }
  return parts;
}
function getQty(fields){if(fields.length>=3){const v=parseFloat(fields[2]);if(!isNaN(v)&&v>0)return v;}return 1;}

function evalE(e){
  try{
    const c=e.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
    const r=Function('"use strict";return('+c+')')();
    return isFinite(r)&&!isNaN(r)?Math.round(r*1000)/1000:null;
  }catch(e){return null;}
}
function updCalc(){
  if(!expr){cexpr.textContent='';cval.textContent=defQty;cval.className='cval';return;}
  cexpr.textContent=expr.replace(/\*/g,'×').replace(/\//g,'÷');
  const r=evalE(expr);
  if(r!==null){cval.textContent=r;cval.className='cval';}
  else{cval.textContent='오류';cval.className='cval err';}
}
function finalQty(){
  if(!expr)return defQty;
  const r=evalE(expr);
  return(r!==null&&r>0)?Math.round(r):null;
}

document.querySelector('.cgrid').addEventListener('click',e=>{
  const b=e.target.closest('.cb');if(!b)return;
  const a=b.dataset.a,v=b.dataset.v;
  if(a==='C'){expr='';updCalc();}
  else if(a==='back'){expr=expr.slice(0,-1);updCalc();}
  else if(a==='cancel'){rp.classList.remove('show');rp.style.display='none';expr='';}
  else if(v!==undefined){
    const ops=['+','-','*','/','%'];
    if(ops.includes(v)&&ops.includes(expr.slice(-1)))expr=expr.slice(0,-1);
    expr+=v;updCalc();
  }
});

document.getElementById('save-btn').addEventListener('click',()=>{
  if(!currentCode){showToast('스캔된 바코드가 없습니다');return;}
  if(!currentWorker){showToast('작업자를 선택해주세요');return;}
  // 사유/위치는 선택사항 — 직접입력 있으면 그거, 없으면 드롭다운, 둘 다 없으면 빈값 OK
  const customVal=(document.getElementById('ctx-custom')||{}).value?.trim()||'';
  const finalCtx=customVal||currentCtx||'';
  const qty=finalQty();
  if(qty===null){showToast('올바른 수량을 입력해주세요');return;}
  const fields=split(currentCode);
  while(fields.length<3)fields.push('');
  fields[2]=String(qty);
  const rec={
    barcode:currentCode,fields,datetime:fmt(new Date()),qty,
    worker:currentWorker,
    mode:currentMode,
    ctx:finalCtx,
    // 호환성: 재고파악 모드에선 location 도 유지
    location:(currentMode==='inv')?finalCtx:''
  };
  records.push(rec);
  sendToTelegram(rec,MODE_CONFIG[currentMode].emoji+' '+MODE_CONFIG[currentMode].name);
  sendToSheet(rec);
  save();
  rp.classList.remove('show');rp.style.display='none';
  currentCode='';lastCode='';lastTime=0;lastResults=[];
  expr='';
  renderList();showToast('저장되었습니다');
  window.scrollTo({top:0,behavior:'smooth'});
});

function onDetected(code){
  const now=Date.now();
  if(code===lastCode&&now-lastTime<5000)return;
  lastCode=code;lastTime=now;
  if(navigator.vibrate)navigator.vibrate([80]);
  currentCode=code;
  const fields=split(code);
  defQty=getQty(fields);
  fp.innerHTML=fields.map((f,i)=>`<span class="chip${i===2?' q':''}"><span class="cnum">${i+1}</span>${f||'　'}</span>`).join('');
  chint.textContent=fields.length>=3?`바코드 수량: ${defQty}`:'기본값 1';
  expr='';updCalc();
  rp.classList.add('show');rp.style.display='block';
}

async function initDetector(){
  if(detector)return true;
  if(!('BarcodeDetector' in window)){
    status.textContent='❌ 이 브라우저는 바코드 인식을 지원하지 않습니다 (크롬 권장)';
    return false;
  }
  const supported=await BarcodeDetector.getSupportedFormats();
  detector=new BarcodeDetector({formats:supported});
  return true;
}

function drawLoop(){
  if(!scanning)return;
  const canvas=document.getElementById('scan-canvas');
  const ctx=canvas.getContext('2d');
  const rect=vid.getBoundingClientRect();
  const dw=rect.width,dh=rect.height;
  if(dw===0||dh===0){requestAnimationFrame(drawLoop);return;}
  canvas.width=dw;canvas.height=dh;
  ctx.clearRect(0,0,dw,dh);
  if(lastResults.length>0&&vid.videoWidth>0){
    const r=lastResults[0];
    const vw=vid.videoWidth,vh=vid.videoHeight;
    const scale=Math.max(dw/vw,dh/vh);
    const ox=(dw-vw*scale)/2,oy=(dh-vh*scale)/2;
    const pts=r.cornerPoints;
    ctx.beginPath();
    ctx.moveTo(pts[0].x*scale+ox,pts[0].y*scale+oy);
    pts.forEach(p=>ctx.lineTo(p.x*scale+ox,p.y*scale+oy));
    ctx.closePath();
    // 모드별 색상
    const clr=currentMode==='in'?'#3b82f6':currentMode==='out'?'#f97316':'#00e5a0';
    ctx.strokeStyle=clr;ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle=(currentMode==='in'?'rgba(59,130,246,0.15)':currentMode==='out'?'rgba(249,115,22,0.15)':'rgba(0,229,160,0.15)');
    ctx.fill();
  }
  requestAnimationFrame(drawLoop);
}

async function scanFrame(){
  if(!scanning)return;
  if(vid.readyState>=2){
    try{
      const vw=vid.videoWidth,vh=vid.videoHeight;
      const dispW=vid.offsetWidth,dispH=vid.offsetHeight;
      const scale=Math.max(dispW/vw,dispH/vh);
      const visW=dispW/scale,visH=dispH/scale;
      const offX=(vw-visW)/2,offY=(vh-visH)/2;
      const bw=Math.floor(visW*0.6),bh=Math.floor(visW*0.6);
      const bx=Math.floor(offX+(visW-bw)/2),by=Math.floor(offY+(visH-bh)/2);
      const crop=document.createElement('canvas');
      crop.width=bw;crop.height=bh;
      crop.getContext('2d').drawImage(vid,bx,by,bw,bh,0,0,bw,bh);
      const results=await detector.detect(crop);
      if(results.length>0){
        const mapped=results.map(r=>({rawValue:r.rawValue,cornerPoints:r.cornerPoints.map(p=>({x:p.x+bx,y:p.y+by}))}));
        lastResults=mapped;
        onDetected(mapped[0].rawValue);
      }else{setTimeout(()=>{lastResults=[];},500);}
    }catch(e){}
  }
  raf=setTimeout(scanFrame,1000);
}

async function startCam(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  scanning=false;if(raf){clearTimeout(raf);raf=null;}
  const ok=await initDetector();if(!ok)return;
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false});
    vid.srcObject=stream;await vid.play();
    scanning=true;
    status.textContent='스캔 중... 바코드를 카메라에 비춰주세요';
    scanFrame();drawLoop();
  }catch(e){status.textContent='❌ 카메라 권한이 필요합니다: '+e.message;}
}

function maxCols(){let m=0;records.forEach(r=>{if(r.fields?.length>m)m=r.fields.length;});return m;}
function modeChip(mode){
  const info=MODE_CONFIG[mode]||MODE_CONFIG.inv;
  return `<span class="tmode ${mode}">${info.emoji} ${info.name}</span>`;
}
function renderList(){
  badge.textContent=records.length+'건';
  if(!records.length){tw.innerHTML='<div style="padding:2.5rem 0;text-align:center;color:var(--muted);font-size:13px;line-height:2">아직 스캔된 항목이 없습니다</div>';return;}
  const mc=maxCols();
  let h='<table><thead><tr><th>날짜/시간</th><th>모드</th>';
  const fn3=['바코드','품명','수량','비고','시트명','파레트위치','구분','업체명'];
  for(let i=0;i<mc;i++)h+=`<th>${fn3[i]||'항목'+(i+1)}</th>`;
  h+='<th>작업자</th><th>사유/위치</th><th>관리</th></tr></thead><tbody>';
  [...records].reverse().forEach((r,ri)=>{
    const idx=records.length-1-ri;
    h+=`<tr><td style="white-space:nowrap;font-size:10px">${r.datetime}</td>`;
    h+=`<td>${modeChip(r.mode||'inv')}</td>`;
    for(let c=0;c<mc;c++){
      const v=r.fields?.[c]??'';
      if(c===2){
        h+=`<td class="tq" data-idx="${idx}" title="클릭해서 수량 수정">${v}</td>`;
      } else {
        h+=`<td>${v}</td>`;
      }
    }
    h+=`<td>${r.worker||''}</td><td>${r.ctx||r.location||''}</td>`;
    h+=`<td><div class="tacts"><button class="tb te" data-i="${idx}">수정</button><button class="tb td" data-i="${idx}">삭제</button></div></td></tr>`;
  });
  h+='</tbody></table>';
  tw.innerHTML=h;
  tw.querySelectorAll('.tb.te').forEach(b=>b.addEventListener('click',()=>openEdit(+b.dataset.i)));
  tw.querySelectorAll('.tb.td').forEach(b=>b.addEventListener('click',()=>{delIdx=+b.dataset.i;document.getElementById('dm').classList.add('show');}));
  // 수량 셀 클릭 → 인라인 수정
  tw.querySelectorAll('.tq').forEach(cell=>{
    cell.addEventListener('click',function(){
      if(this.classList.contains('editing'))return;
      const idx=+this.dataset.idx;
      const curVal=this.textContent.trim();
      this.classList.add('editing');
      this.innerHTML='';
      const inp=document.createElement('input');
      inp.type='number';inp.value=curVal;inp.min='0';inp.step='any';
      this.appendChild(inp);
      inp.focus();inp.select();
      const saveEdit=()=>{
        const q=parseFloat(inp.value);
        if(!isNaN(q)&&q>0){
          const r=records[idx];
          const oldVal=r.fields?.[2];
          while(r.fields.length<3)r.fields.push('');
          r.fields[2]=String(q);
          r.qty=q;
          save();renderList();
          if(String(oldVal)!==String(q)){
            showToast('수량 '+oldVal+' → '+q+' 수정됨');
            sendToTelegram({...r},'✏️ 수량 수정 ('+oldVal+'→'+q+')');
          }
        } else {
          this.classList.remove('editing');
          this.textContent=curVal;
        }
      };
      const cancelEdit=()=>{
        this.classList.remove('editing');
        this.textContent=curVal;
      };
      inp.addEventListener('keydown',function(e){
        if(e.key==='Enter'){e.preventDefault();saveEdit();}
        else if(e.key==='Escape'){e.preventDefault();cancelEdit();}
      });
      inp.addEventListener('blur',saveEdit);
    });
  });
}

const FIELD_NAMES=['바코드','품명','수량','비고','시트명','파레트위치','구분','업체명'];
function openEdit(idx){
  editIdx=idx;const r=records[idx];
  const cont=document.getElementById('efields');cont.innerHTML='';
  // 모드 선택
  const rm=document.createElement('div');rm.className='erow';
  const lm=document.createElement('label');lm.textContent='모드';
  const im=document.createElement('select');
  ['in','out','inv'].forEach(m=>{
    const o=document.createElement('option');o.value=m;o.textContent=MODE_CONFIG[m].emoji+' '+MODE_CONFIG[m].name;
    if((r.mode||'inv')===m)o.selected=true;im.appendChild(o);
  });
  im.dataset.fi='mode';
  rm.append(lm,im);cont.appendChild(rm);
  for(let i=0;i<8;i++){
    const row=document.createElement('div');row.className='erow';
    const lbl=document.createElement('label');lbl.textContent=FIELD_NAMES[i];
    if(i===2)lbl.style.cssText='color:var(--accent);font-weight:500';
    const inp=document.createElement('input');
    inp.type=i===2?'number':'text';
    inp.value=r.fields?.[i]||'';inp.dataset.fi=i;
    if(i===2)inp.className='qi';
    row.append(lbl,inp);cont.appendChild(row);
  }
  const rw=document.createElement('div');rw.className='erow';
  const lw=document.createElement('label');lw.textContent='작업자';
  const iw=document.createElement('input');iw.type='text';iw.value=r.worker||'';iw.dataset.fi='worker';
  rw.append(lw,iw);cont.appendChild(rw);
  const rl=document.createElement('div');rl.className='erow';
  const ll=document.createElement('label');ll.textContent='사유/위치';
  const il=document.createElement('input');il.type='text';il.value=r.ctx||r.location||'';il.dataset.fi='ctx';
  rl.append(ll,il);cont.appendChild(rl);
  document.getElementById('em').classList.add('show');
}
document.getElementById('ec').addEventListener('click',()=>document.getElementById('em').classList.remove('show'));
document.getElementById('es').addEventListener('click',()=>{
  const r=records[editIdx];
  document.querySelectorAll('#efields input, #efields select').forEach(inp=>{
    const fi=inp.dataset.fi;
    if(fi==='worker')r.worker=inp.value.trim();
    else if(fi==='ctx'){r.ctx=inp.value.trim();r.location=(r.mode==='inv')?r.ctx:'';}
    else if(fi==='mode')r.mode=inp.value;
    else r.fields[+fi]=inp.value.trim();
  });
  const q=parseFloat(r.fields[2]);r.qty=(!isNaN(q)&&q>0)?q:1;
  save();renderList();document.getElementById('em').classList.remove('show');showToast('수정되었습니다');
  sendToTelegram({...records[editIdx]},'✏️ 수정됨');
});

document.getElementById('dc').addEventListener('click',()=>document.getElementById('dm').classList.remove('show'));
document.getElementById('dok').addEventListener('click',()=>{
  if(delIdx>=0){
    const d=records[delIdx];
    const deleted={fields:d.fields||[],worker:d.worker||'',ctx:d.ctx||d.location||'',datetime:d.datetime||'',mode:d.mode||'inv'};
    records.splice(delIdx,1);save();renderList();showToast('삭제되었습니다');
    sendToTelegram(deleted,'🗑️ 삭제됨');
  }
  document.getElementById('dm').classList.remove('show');delIdx=-1;
});

document.getElementById('reset-btn').addEventListener('click',()=>document.getElementById('cm').classList.add('show'));
document.getElementById('cc').addEventListener('click',()=>document.getElementById('cm').classList.remove('show'));
document.getElementById('cok').addEventListener('click',()=>{
  records=[];save();renderList();document.getElementById('cm').classList.remove('show');showToast('초기화되었습니다');
});

// 모드별로 레코드 필터링 + 해당 모드의 행/헤더 구성
function buildRowsByMode(mode){
  const filtered=records.filter(r=>(r.mode||'inv')===mode);
  if(!filtered.length) return null;
  let mc=0; filtered.forEach(r=>{if(r.fields?.length>mc)mc=r.fields.length;});
  const fn=['바코드','품명','수량','비고','시트명','파레트위치','구분','업체명'];
  const info=MODE_CONFIG[mode];
  // 모드별 사유/위치 컬럼명
  const ctxColName=info?info.ctxLabel:'사유/위치';
  const headers=['날짜/시간',...Array.from({length:mc},(_,i)=>fn[i]||`항목${i+1}`),'작업자',ctxColName];
  const rows=filtered.map(r=>{
    const row={'날짜/시간':r.datetime};
    for(let i=0;i<mc;i++)row[fn[i]||`항목${i+1}`]=r.fields?.[i]??'';
    row['작업자']=r.worker||'';
    row[ctxColName]=r.ctx||r.location||'';
    return row;
  });
  return{headers,rows,mode,count:filtered.length};
}
// 파일명 (모드별)
function makeFilenameByMode(mode,ext){
  const now=new Date(),p=n=>String(n).padStart(2,'0');
  const modeName=MODE_CONFIG[mode]?.name||'기록';
  return modeName+'_'+(currentWorker||'작업자없음')+'_'+now.getFullYear()+'-'+p(now.getMonth()+1)+'-'+p(now.getDate())+'_'+p(now.getHours())+'_'+p(now.getMinutes())+'.'+ext;
}

document.getElementById('csv-btn').addEventListener('click',()=>{
  if(!records.length){showToast('데이터가 없습니다');return;}
  let exportedCnt=0;
  ['in','out','inv'].forEach(mode=>{
    const r=buildRowsByMode(mode);if(!r)return;
    const info=MODE_CONFIG[mode];
    const lines=['\uFEFF'+r.headers.join(','),...r.rows.map(row=>r.headers.map(h=>'"'+(row[h]??'')+'"').join(','))];
    const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8'});
    const fname=makeFilenameByMode(mode,'csv');
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;a.click();
    sendTelegramFile(blob,fname,info.emoji+' '+info.name+' CSV | '+r.count+'건');
    exportedCnt++;
  });
  showToast(exportedCnt+'개 모드 CSV 내보냈습니다');
});

document.getElementById('xlsx-btn').addEventListener('click',()=>{
  if(!records.length){showToast('데이터가 없습니다');return;}
  let exportedCnt=0;
  ['in','out','inv'].forEach(mode=>{
    const r=buildRowsByMode(mode);if(!r)return;
    const info=MODE_CONFIG[mode];
    const ws=XLSX.utils.json_to_sheet(r.rows);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,info.name);
    const fname=makeFilenameByMode(mode,'xlsx');
    const blob=new Blob([XLSX.write(wb,{bookType:'xlsx',type:'array'})],{type:'application/octet-stream'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;a.click();
    sendTelegramFile(blob,fname,info.emoji+' '+info.name+' 엑셀 | '+r.count+'건');
    exportedCnt++;
  });
  showToast(exportedCnt+'개 모드 엑셀 내보냈습니다');
});

let currentWorker='',currentCtx='';

// 모드 전환 — UI 업데이트 + 드롭다운 재구성 + 저장
function setMode(mode, silent){
  const prevMode=currentMode;
  currentMode=mode;
  document.body.classList.remove('mode-in','mode-out','mode-inv');
  document.body.classList.add('mode-'+mode);
  document.querySelectorAll('.mbtn').forEach(b=>{
    b.classList.toggle('active', b.dataset.mode===mode);
  });
  const info=MODE_CONFIG[mode];
  document.getElementById('ctx-label').textContent=info.label;
  // 드롭다운 옵션 재구성
  const sel=document.getElementById('ctx-select');
  const prev=localStorage.getItem('cur_ctx_'+mode)||'';
  sel.innerHTML='<option value="">'+info.ctxLabel+' 선택</option>';
  info.options.forEach(o=>{
    const op=document.createElement('option');op.value=o;op.textContent=o;
    if(o===prev)op.selected=true;
    sel.appendChild(op);
  });
  currentCtx=prev;
  // 직접입력도 모드별로 기억
  var ci=document.getElementById('ctx-custom');
  if(ci){
    ci.value=localStorage.getItem('cur_ctx_custom_'+mode)||'';
  }
  try{localStorage.setItem('cur_mode',mode);}catch(e){}
  // 모드 변경 시 토스트 (최초 로드는 silent)
  if(!silent && prevMode!==mode){
    showToast(info.emoji+' '+info.name+' 모드로 변경됨');
    if(navigator.vibrate)navigator.vibrate([50]);
  }
}

function loadSelections(){
  try{
    currentWorker=localStorage.getItem('cur_worker')||'';
    const ws=document.getElementById('worker-select');
    [...ws.options].forEach(o=>{if(o.value===currentWorker)o.selected=true;});
    currentMode=localStorage.getItem('cur_mode')||'inv';
    setMode(currentMode, true);  // 초기 로드는 토스트 없이
  }catch(e){setMode('inv', true);}
}
document.getElementById('worker-select').addEventListener('change',function(){
  currentWorker=this.value;localStorage.setItem('cur_worker',currentWorker);
});
document.getElementById('ctx-select').addEventListener('change',function(){
  currentCtx=this.value;
  try{localStorage.setItem('cur_ctx_'+currentMode,currentCtx);}catch(e){}
});
// 직접입력 자동 저장 (모드별로 별도 저장)
document.getElementById('ctx-custom').addEventListener('input',function(){
  try{localStorage.setItem('cur_ctx_custom_'+currentMode,this.value);}catch(e){}
});
document.getElementById('ctx-custom-clear').addEventListener('click',function(){
  var ci=document.getElementById('ctx-custom'); if(ci) ci.value='';
  try{localStorage.removeItem('cur_ctx_custom_'+currentMode);}catch(e){}
});
document.querySelectorAll('.mbtn').forEach(b=>{
  b.addEventListener('click',()=>setMode(b.dataset.mode));
});

const TG_TOKEN='8738272541:AAEOxdgMAngcs23txBNX5N0admlYGtgxgT0';
const TG_CHAT_IDS=[8613833560]; // 여러 명 추가 가능: [123456, 789012]

async function sendToTelegram(rec,prefix){
  if(!TG_TOKEN||!TG_CHAT_IDS.length)return;
  try{
    const f=rec.fields||[];
    const fn=['바코드','품명','수량','비고','시트명','파레트위치','구분','업체명'];
    const modeLabel=rec.mode?(MODE_CONFIG[rec.mode]||MODE_CONFIG.inv).ctxLabel:'위치';
    const lines=[prefix,
      ...f.map((v,i)=>v?(fn[i]||'항목'+(i+1))+': '+v:'').filter(Boolean),
      rec.worker?'👤 작업자: '+rec.worker:'',
      (rec.ctx||rec.location)?(modeLabel+': '+(rec.ctx||rec.location)):'',
      '🕐 '+rec.datetime
    ].filter(Boolean).join('\n');
    for(const chatId of TG_CHAT_IDS){
      await fetch('https://api.telegram.org/bot'+TG_TOKEN+'/sendMessage',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chat_id:chatId,text:lines})
      });
    }
  }catch(e){}
}

async function sendTelegramFile(blob,filename,caption){
  if(!TG_TOKEN||!TG_CHAT_IDS.length)return;
  try{
    for(const chatId of TG_CHAT_IDS){
      const form=new FormData();
      form.append('chat_id',chatId);
      form.append('caption',caption);
      form.append('document',blob,filename);
      await fetch('https://api.telegram.org/bot'+TG_TOKEN+'/sendDocument',{method:'POST',body:form});
    }
  }catch(e){}
}

const GS_URL='https://script.google.com/macros/s/AKfycbwkbhcT42ncKjOjBJ3qXbddGzXYv511J5bxQi5sEOAmgGM_BoirRTqF8s5gvbw2J0B88w/exec';
async function sendToSheet(rec){
  try{
    const modeName=(MODE_CONFIG[rec.mode||'inv']||{}).name||'재고파악';
    const row=[rec.datetime,modeName,...(rec.fields||[]),rec.worker||'',rec.ctx||rec.location||''];

function makeFilename(ext){
  const now=new Date(),p=n=>String(n).padStart(2,'0');
  const modeName=(MODE_CONFIG[currentMode]||{}).name||'기록';
  return modeName+'_'+(currentWorker||'작업자없음')+'_'+now.getFullYear()+'-'+p(now.getMonth()+1)+'-'+p(now.getDate())+'_'+p(now.getHours())+'_'+p(now.getMinutes())+'.'+ext;
}

let pendingImportFile=null;
function doImport(file){
  if(!file)return;
  if(typeof XLSX==='undefined'){showToast('잠시 후 다시 시도해주세요');return;}
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(rows.length<2){showToast('데이터가 없습니다');return;}
      const headers=rows[0];
      const imported=[];
      const modeMap={'입고':'in','출고':'out','재고파악':'inv'};
      for(let i=1;i<rows.length;i++){
        const row=rows[i];if(!row.some(v=>v))continue;
        const datetime=String(row[0]||'');
        const mi=headers.indexOf('모드');
        const modeStr=mi>=0?String(row[mi]||''):'';
        const mode=modeMap[modeStr]||'inv';
        const wi=headers.indexOf('작업자');
        const cxi=headers.indexOf('사유/위치')>=0?headers.indexOf('사유/위치'):headers.indexOf('위치');
        const worker=wi>=0?String(row[wi]||''):'';
        const ctx=cxi>=0?String(row[cxi]||''):'';
        const fields=[];
        headers.forEach((h,hi)=>{if(h==='날짜/시간'||h==='모드'||h==='작업자'||h==='사유/위치'||h==='위치')return;fields.push(String(row[hi]||''));});
        imported.push({barcode:fields.join('/'),fields,datetime,qty:parseFloat(fields[2])||1,worker,mode,ctx,location:mode==='inv'?ctx:''});
      }
      if(!imported.length){showToast('불러올 데이터가 없습니다');return;}
      records=imported;save();renderList();
      showToast(imported.length+'건 불러왔습니다');
    }catch(err){showToast('파일 읽기 실패');}
  };
  reader.readAsArrayBuffer(file);
}
document.getElementById('import-file').addEventListener('change',function(e){
  const file=e.target.files[0];if(!file)return;
  this.value='';
  if(records.length>0){pendingImportFile=file;document.getElementById('im').classList.add('show');}
  else{doImport(file);}
});
document.getElementById('im-cancel').addEventListener('click',()=>{document.getElementById('im').classList.remove('show');pendingImportFile=null;});
document.getElementById('im-ok').addEventListener('click',()=>{
  document.getElementById('im').classList.remove('show');
  if(records.length>0){
    const{headers,rows}=buildRows();
    const lines=['\uFEFF'+headers.join(','),...rows.map(r=>headers.map(h=>'"'+(r[h]??'')+'"').join(','))];
    const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=makeFilename('csv');a.click();
  }
  doImport(pendingImportFile);pendingImportFile=null;
});
