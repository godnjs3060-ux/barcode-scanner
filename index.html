<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바코드 스캐너</title>

<style>
body{margin:0;font-family:sans-serif;background:#000;color:#fff}
#video{width:100%;height:250px;object-fit:cover;background:#000}
#overlay{
  position:absolute;top:0;left:0;width:100%;height:250px;
  border:2px solid rgba(0,255,0,0.5);
  box-sizing:border-box;
}
#controls{padding:10px;background:#111}
button{padding:10px;margin:5px;border:none;border-radius:6px}
#start{background:#00e5a0;color:#000}
#save{background:#333;color:#fff}
#reset{background:#ff4d4d;color:#fff}
input{padding:8px;border-radius:6px;border:none;margin:5px}
#list{padding:10px}
.item{border-bottom:1px solid #333;padding:8px 0;display:flex;justify-content:space-between}
.qty{color:#00e5a0}
</style>
</head>

<body>

<div style="position:relative;">
  <video id="video" autoplay playsinline></video>
  <div id="overlay"></div>
</div>

<div id="controls">

  <input id="worker" placeholder="작업자 이름 (필수)">

  <button id="start">카메라 시작</button>
  <button id="save">저장+공유</button>
  <button id="reset">초기화</button>

  <br>

  <input id="manualCode" placeholder="바코드 입력">
  <input id="manualQty" type="number" value="1">
  <button id="addManual">수동추가</button>

</div>

<div id="list"></div>

<script>
let stream;
let records = JSON.parse(localStorage.getItem('records')||'[]');

// 작업자 유지
const savedWorker = localStorage.getItem('worker');
if(savedWorker){
  window.addEventListener('DOMContentLoaded',()=>{
    document.getElementById('worker').value = savedWorker;
  });
}

function saveLocal(){
  localStorage.setItem('records',JSON.stringify(records));
}

function nowStr(){
  const d=new Date();
  return d.toISOString().replace('T',' ').substring(0,19);
}

function fileName(){
  const d=new Date();
  const yyyy=d.getFullYear();
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  const hh=String(d.getHours()).padStart(2,'0');
  const mi=String(d.getMinutes()).padStart(2,'0');
  const ss=String(d.getSeconds()).padStart(2,'0');
  const w=document.getElementById('worker').value || 'unknown';
  return `scan_${w}_${yyyy}-${mm}-${dd}_${hh}-${mi}-${ss}`;
}

function render(){
  const el=document.getElementById('list');
  el.innerHTML = records.map((r,i)=>`
    <div class="item">
      <div>
        <div>${r.code}</div>
        <small>${r.time} / ${r.worker}</small>
      </div>
      <div>
        <span class="qty">${r.qty}</span>
        <button onclick="edit(${i})">수정</button>
        <button onclick="del(${i})">삭제</button>
      </div>
    </div>
  `).join('');
}

function addRecord(code,qty=1){
  const worker=document.getElementById('worker').value;

  if(!worker){
    alert('작업자 이름을 입력하세요');
    return;
  }

  localStorage.setItem('worker', worker);

  let f=records.find(r=>r.code===code);
  if(f) f.qty+=qty;
  else records.push({code,qty,time:nowStr(),worker});

  navigator.vibrate?.(100);
  saveLocal(); render();
}

// 🔥 카메라 (안정)
async function start(){
  try{
    const video=document.getElementById('video');

    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'}},
      audio:false
    });

    video.srcObject = stream;
    await video.play();

  }catch(e){
    alert('카메라 오류: '+e.message);
  }
}

// 저장+공유
async function saveAndShare(){
  if(records.length===0){
    alert('데이터 없음');
    return;
  }

  const blob=new Blob([JSON.stringify(records)],{type:'application/json'});
  const filename=fileName()+'.json';

  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();

  const file=new File([blob],filename,{type:'application/json'});

  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{
      await navigator.share({files:[file],title:'스캔 데이터'});
    }catch(e){}
  }
}

function reset(){
  if(confirm('전체 삭제?')){
    records=[]; saveLocal(); render();
  }
}

function edit(i){
  const q=prompt('수량',records[i].qty);
  if(q){records[i].qty=parseInt(q)||1; saveLocal(); render();}
}

function del(i){
  if(confirm('삭제?')){
    records.splice(i,1); saveLocal(); render();
  }
}

// 수동 입력
addManual.onclick=()=>{
  const c=manualCode.value.trim();
  const q=parseInt(manualQty.value)||1;
  if(!c) return alert('코드 입력');
  addRecord(c,q);
  manualCode.value='';
};

start.onclick=start;
save.onclick=saveAndShare;
reset.onclick=reset;

render();
</script>

</body>
</html>
