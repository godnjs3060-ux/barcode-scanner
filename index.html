<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바코드 스캐너 PRO++</title>
<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff}
#video{width:100%;height:220px;object-fit:cover;background:#000}
#controls{padding:10px}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer}
#start{background:#00e5a0;color:#000}
#export{background:#333;color:#fff}
#reset{background:#ff4d4d;color:#fff}
input,select{padding:8px;border-radius:6px;border:none;margin:5px}
#list{padding:10px}
.item{border-bottom:1px solid #333;padding:8px 0;display:flex;justify-content:space-between}
.qty{color:#00e5a0}
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>

<div id="controls">
  <input id="manager" placeholder="관리자 이름">
  <select id="mode">
    <option value="sum">누적</option>
    <option value="single">단건</option>
    <option value="manual">확인</option>
  </select><br>

  <button id="start">스캔 시작</button>
  <button id="export">CSV</button>
  <button id="xlsx">엑셀</button>
  <button id="downloadLocal">파일 저장</button>
  <button id="share">공유</button>
  <button id="reset">초기화</button><br>

  <input id="manualCode" placeholder="바코드 입력">
  <input id="manualQty" type="number" value="1">
  <button id="addManual">수동추가</button>

  <input type="file" id="fileInput" style="display:none">
</div>

<div id="list"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let detector, stream;
let lastScan="", lastTime=0;
let records = JSON.parse(localStorage.getItem('records')||'[]');

function save(){
  localStorage.setItem('records',JSON.stringify(records));
}

function nowStr(){
  const d=new Date();
  return d.toISOString().replace(/T/,' ').substring(0,19);
}

function fileName(){
  const d=new Date();
  const s=d.toISOString().replace(/[:T]/g,'-').slice(0,19);
  const m=document.getElementById('manager').value||'unknown';
  return `scan_${m}_${s}`;
}

function render(){
  const el=document.getElementById('list');
  el.innerHTML = records.map((r,i)=>`
    <div class="item">
      <div>
        <div>${r.code}</div>
        <small>${r.time} / ${r.manager||''}</small>
      </div>
      <div>
        <span class="qty">${r.qty}</span>
        <button onclick="edit(${i})">수정</button>
        <button onclick="del(${i})">삭제</button>
      </div>
    </div>
  `).join('');
}

function addRecord(code,qty=1){
  const mode=document.getElementById('mode').value;
  const manager=document.getElementById('manager').value;

  if(mode==='sum'){
    let f=records.find(r=>r.code===code);
    if(f) f.qty+=qty;
    else records.push({code,qty,time:nowStr(),manager});
  }
  else if(mode==='single'){
    records.push({code,qty:1,time:nowStr(),manager});
  }
  else{
    const input=prompt('수량 입력',qty);
    const q=parseInt(input)||1;
    records.push({code,qty:q,time:nowStr(),manager});
  }

  navigator.vibrate?.(100);
  save(); render();
}

async function start(){
  if(!('BarcodeDetector' in window)) return alert('크롬 사용');
  detector=new BarcodeDetector();
  stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
  video.srcObject=stream;
  scan();
}

async function scan(){
  const v=document.getElementById('video');
  if(v.readyState===v.HAVE_ENOUGH_DATA){
    const b=await detector.detect(v);
    if(b.length){
      const code=b[0].rawValue;
      const now=Date.now();
      if(code!==lastScan||now-lastTime>1500){
        lastScan=code; lastTime=now;
        addRecord(code,1);
      }
    }
  }
  requestAnimationFrame(scan);
}

function exportCSV(){
  let csv='code,qty,time,manager\n';
  records.forEach(r=>csv+=`${r.code},${r.qty},${r.time},${r.manager}\n`);
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=fileName()+'.csv';
  a.click();
}

function exportXLSX(){
  const ws=XLSX.utils.json_to_sheet(records);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'data');
  XLSX.writeFile(wb,fileName()+'.xlsx');
}

function downloadJSON(){
  const blob=new Blob([JSON.stringify(records)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=fileName()+'.json';
  a.click();
}

async function shareFile(){
  const blob=new Blob([JSON.stringify(records)],{type:'application/json'});
  const file=new File([blob],fileName()+'.json');
  if(navigator.share){
    await navigator.share({files:[file],title:'스캔 데이터'});
  }else alert('공유 미지원');
}

function reset(){ if(confirm('전체 삭제?')){records=[];save();render();}}
function edit(i){const q=prompt('수량',records[i].qty);if(q){records[i].qty=parseInt(q)||1;save();render();}}
function del(i){if(confirm('삭제?')){records.splice(i,1);save();render();}}

addManual.onclick=()=>{
  const c=manualCode.value.trim();
  const q=parseInt(manualQty.value)||1;
  if(!c) return alert('코드 입력');
  addRecord(c,q);
  manualCode.value='';
};

start.onclick=start;
export.onclick=exportCSV;
xlsx.onclick=exportXLSX;
downloadLocal.onclick=downloadJSON;
share.onclick=shareFile;
reset.onclick=reset;

render();
</script>

</body>
</html>
